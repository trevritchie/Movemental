version: 2
updates:
  # JavaScript/TypeScript dependencies for the web app (package.json/package-lock.json
  # at the repo root). python-prototype/ has no dependency manifest, so there is
  # nothing for Dependabot to manage there.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      production-dependencies:
        dependency-type: "production"
      # typescript and the eslint/typescript-eslint toolchain have tightly
      # coupled peer dependency ranges (typescript-eslint typically lags a
      # new TypeScript major for a while). Grouping them separately means a
      # temporarily incompatible combination only blocks this group's PR,
      # not the unrelated dev-dependency bumps below.
      typescript-tooling:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-plugin-*"
          - "@eslint/*"
          - "globals"
      development-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "typescript"
          - "typescript-eslint"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-plugin-*"
          - "@eslint/*"
          - "globals"

  # Actions used by the CI/deploy workflows in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
