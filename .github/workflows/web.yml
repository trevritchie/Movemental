name: Web

on:
  push:
    branches: [main]
    paths-ignore:
      - 'python-prototype/**'
  pull_request:
    paths-ignore:
      - 'python-prototype/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint
        env:
          CI: true

      - run: npm test -- --run
        env:
          CI: true

      - run: npm run build
        env:
          CI: true

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          CI: true

      - run: npx firebase deploy --only hosting --project prod --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
