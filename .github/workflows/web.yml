name: Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'

defaults:
  run:
    working-directory: web

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run lint
        env:
          CI: true

      - run: npm test -- --run
        env:
          CI: true

      - run: npm run build
        env:
          CI: true
