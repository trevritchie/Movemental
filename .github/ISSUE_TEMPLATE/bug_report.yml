name: Bug report
description: Report something that isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections
        below so the issue can be reproduced.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Select chord '...'
        3. See error
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser and OS
      placeholder: e.g. Safari 17 on iOS 18, Chrome 126 on macOS 15
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Console errors, screenshots, or recordings, if you have them.
    validations:
      required: false
